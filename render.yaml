services:
  - type: web
    name: stock-opportunity-lab
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: STOCK_LAB_DATA_DIR
        value: /data
      - key: STOCK_LAB_DATABASE_URL
        sync: false
      - key: STOCK_LAB_FEISHU_APP_SECRET
        sync: false
      - key: STOCK_LAB_CLIENT_AUTH_SECRET
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
